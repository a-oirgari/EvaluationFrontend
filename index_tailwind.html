<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>TicketMatch — FC VOID</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 font-sans">


    <header class="bg-green-600 text-white">

        <div class="max-w-6xl mx-auto flex justify-between items-center p-4">

            <h1 class="text-xl font-bold">TicketMatch</h1>

            <nav class="space-x-6 hidden md:block">
                <a href="#" class="hover:text-green-200">Accueil</a>
                <a href="#" class="hover:text-green-200">Matchs</a>
                <a href="#" class="hover:text-green-200">Mes Réservations</a>
            </nav>

        </div>

    </header>



    <main class="max-w-6xl mx-auto p-6 space-y-10">


        
        <section class="bg-white shadow-lg rounded-lg p-6">

            <h2 class="text-2xl font-bold mb-4">Prochain match</h2>

            <p class="text-lg font-semibold">
                FC VOID vs Raja Club
            </p>

            <p>Date : 15/03/2025 — 20:00</p>
            <p>Stade Mohammed V</p>

            <div class="mt-4">
                <button class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                    Réserver
                </button>
            </div>

        </section>



        
        <section class="bg-white shadow-lg rounded-lg p-6 max-w-3xl mx-auto">

            <h2 class="text-2xl font-bold mb-6">Réserver un ticket</h2>

            <form class="space-y-4">

                
                <div class="grid md:grid-cols-2 gap-4">

                    <div>
                        <label class="block mb-1 font-medium">Nom complet</label>
                        <input type="text" required class="w-full border rounded p-2 focus:ring focus:ring-green-200">
                    </div>

                    <div>
                        <label class="block mb-1 font-medium">Email</label>
                        <input type="email" required class="w-full border rounded p-2 focus:ring focus:ring-green-200">
                    </div>

                </div>


                
                <div>
                    <label class="block mb-1 font-medium">Téléphone</label>
                    <input type="tel" class="w-full border rounded p-2">
                </div>


                
                <div>
                    <label class="block mb-1 font-medium">Match</label>

                    <select class="w-full border rounded p-2">

                        <option>FC VOID vs Raja Club — 15/03/2025</option>
                        <option>FC VOID vs Wydad AC — 22/03/2025</option>
                        <option>FC VOID vs AS FAR — 05/04/2025</option>

                    </select>

                </div>


                
                <div>
                    <p class="font-medium mb-2">Catégorie</p>

                    <div class="flex gap-6">

                        <label class="flex items-center gap-2">
                            <input type="radio" name="categorie">
                            Tribune
                        </label>

                        <label class="flex items-center gap-2">
                            <input type="radio" name="categorie">
                            Virage
                        </label>

                        <label class="flex items-center gap-2">
                            <input type="radio" name="categorie">
                            Pelouse
                        </label>

                    </div>

                </div>


                
                <div>
                    <label class="block mb-1 font-medium">Nombre de tickets</label>

                    <input type="number" min="1" max="10" class="w-full border rounded p-2">

                </div>


                
                <div>

                    <label class="block mb-1 font-medium">Commentaire</label>

                    <textarea rows="3" class="w-full border rounded p-2"></textarea>

                </div>


                
                <div class="flex items-center gap-2">

                    <input type="checkbox" required>

                    <label>J'accepte les conditions générales</label>

                </div>


                

                <button class="bg-green-600 text-white px-6 py-3 rounded hover:bg-green-700">

                    Réserver mon ticket

                </button>

            </form>

        </section>

    </main>



    

    <footer class="bg-gray-900 text-gray-300 text-center p-4">

        © 2025 FC VOID — Tous droits réservés

    </footer>


</body>

</html>
